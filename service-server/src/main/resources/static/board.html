<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeepChess API Tester</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <link rel="stylesheet" href="/css/board.css">
</head>
<body>
    <div id="board-wrapper">
        <div class="board-row">
            <div class="eval-bar" title="엔진 평가치">
                <div id="evalFill" class="eval-fill"></div>
                <div id="evalText" class="eval-text white-adv">0.0</div>
            </div>
            <div id="myBoard"></div>
        </div>
        <div class="nav-container">
            <button id="moveFirstBtn" class="nav-btn" aria-label="처음 수">
                <svg viewBox="0 0 24 24"><path d="M18 18L12 12L18 6M11 18L5 12L11 6"/></svg>
            </button>
            <button id="movePrevBtn" class="nav-btn" aria-label="이전 수">
                <svg viewBox="0 0 24 24"><path d="M15 18L9 12L15 6"/></svg>
            </button>
            <button id="moveNextBtn" class="nav-btn" aria-label="다음 수">
                <svg viewBox="0 0 24 24"><path d="M9 18L15 12L9 6"/></svg>
            </button>
            <button id="moveLastBtn" class="nav-btn" aria-label="마지막 수">
                <svg viewBox="0 0 24 24"><path d="M6 18L12 12L6 6M13 18L19 12L13 6"/></svg>
            </button>
            <button id="flipBoardBtn" class="nav-btn" title="보드 회전" aria-label="보드 회전">
                <svg viewBox="0 0 24 24"><path d="M8 4V20M4 8L8 4L12 8M16 20V4M12 16L16 20L20 16"/></svg>
            </button>
        </div>
    </div>

    <div id="history-wrapper">
        <div class="history-box">
            <h4>📜 기보 히스토리</h4>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="control-panel">
        <button id="newGameBtn">새 분석 보드 생성</button>

        <div class="top-controls">
            <div class="panel-box" id="importSection">
                <h4 class="import-title">📁 기보 불러오기</h4>
                <input type="text" id="importData" placeholder="FEN 또는 PGN 입력">
                <button id="importBtn">기보 불러오기</button>
            </div>

            <div class="panel-box">
                <h4>게임 정보</h4>
                <div id="result">준비 완료.</div>
                <div id="gameResult" class="game-result"></div>
                <button id="permanentSaveBtn">💾 기보 저장하기</button>
            </div>
        </div>

        <div class="panel-box" id="recommendSection">
            <h4 class="recommend-title">💡 추천 수 (상위 3개)</h4>
            <div id="topMovesList">
                <div class="empty-message">기보를 클릭해 분석을 확인하세요.</div>
            </div>
        </div>
    </div>

    <script type="module" src="/js/board/main.js"></script>
</body>
</html>
