<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DeepChess API Tester</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #f4f7f6;
            --border: #dee2e6;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            margin: 40px; 
            display: flex; 
            gap: 25px; 
            background-color: var(--bg); 
            align-items: flex-start;
            justify-content: center;
        }

        #board-wrapper { display: flex; flex-direction: column; gap: 20px; }
        
        .board-row {
            display: flex;
            flex-direction: row;
            gap: 15px;
            align-items: stretch; 
        }

        #myBoard { width: 520px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        
        /* 🟢 평가치 바 (가로 너비 30px로 확대) */
        .eval-bar {
            width: 30px;
            background-color: #404040; 
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .eval-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; 
            background-color: #f8f9fa; 
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .eval-badge {
            display: inline-block;
            min-width: 48px; /* 10.00 이나 -M10 도 넉넉히 들어가는 고정 최소 너비 */
            padding: 4px 8px;
            border-radius: 6px; /* 끝이 뭉특한 둥근 모서리 */
            font-size: 0.9em;
            font-weight: bold;
            text-align: center;
            font-family: 'Consolas', monospace; /* 숫자가 삐뚤어지지 않게 고정폭 폰트 적용 */
        }

        /* 백 유리 (+) : 흰 바탕, 검은 글씨, 얇은 회색 테두리 */
        .eval-badge.white-adv {
            background-color: #ffffff;
            color: #333333;
            border: 1px solid #ced4da;
        }

        /* 흑 유리 (-) : 검은 바탕, 흰 글씨 */
        .eval-badge.black-adv {
            background-color: #343a40;
            color: #f8f9fa;
            border: 1px solid #343a40;
        }

        /* 🟢 평가치 텍스트 디자인 */
        .eval-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: -0.5px;
            z-index: 10;
            left: 0;
            transition: all 0.3s ease;
            user-select: none;
            pointer-events: none;
        }
        /* 백이 유리할 땐 아래쪽에 어두운 글씨 */
        .eval-text.white-adv {
            bottom: 8px;
            top: auto;
            color: #2c3e50; 
        }
        /* 흑이 유리할 땐 위쪽에 밝은 글씨 */
        .eval-text.black-adv {
            top: 8px;
            bottom: auto;
            color: #f8f9fa; 
        }

        .nav-container { display: flex; gap: 10px; width: 100%; max-width: 565px; } 
        .nav-btn { 
            flex: 1; padding: 15px; background-color: var(--secondary); color: white; 
            border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background-color: #1a252f; transform: translateY(-1px); }
        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        #history-wrapper { width: 360px; display: flex; flex-direction: column; }
        .history-box { 
            background-color: white; padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 580px; 
        }
        /* 📜 기보 히스토리 (턴 단위 표 스타일) */
        .history-list { 
            font-size: 1.1em; 
            color: #2c3e50; 
            padding-right: 8px; 
            margin-top: 15px;
            height: calc(100% - 40px); 
            overflow-y: auto; 
        }
        .history-list::-webkit-scrollbar { width: 8px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        /* 개별 수 클릭 버튼 */
        .move-clickable {
            flex: 1;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.1s, color 0.1s;
        }
        .move-clickable:hover { background-color: #e2e8f0; }

        /* 하나의 턴(1. e4 e5)을 감싸는 행 */
        .turn-row {
            display: flex;
            padding: 6px 12px;
            border-bottom: 1px solid #f1f5f9;
        }
        .turn-row:nth-child(even) { background-color: #f8f9fa; }
        
        /* 턴 번호 (예: 1.) */
        .turn-num { width: 45px; color: #888; font-weight: bold; }
        
        /* 기보 영역 (백과 흑의 수 공간을 균등하게 분배) */
        .turn-moves { flex: 1; display: flex; gap: 10px; }

        .white-move { background-color: #ffffff; }
        .black-move { background-color: #f2f2f2; } 
        .white-move:hover { background-color: #f8f9fa; }
        .black-move:hover { background-color: #e5e5e5; }

        .history-item { 
            padding: 12px 16px; cursor: pointer; font-size: 1.15em; border-radius: 6px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #eee; transition: 0.2s;
        }
        .active-node { 
            background-color: #e2e8f0 !important; 
            color: #0f172a !important; 
            font-weight: 900 !important; /* 글씨 최대 굵기 */
            box-shadow: inset 0 0 0 1px #94a3b8; /* 테두리 효과로 구별감 상승 */
        }

        .variation-container { margin-top: 4px; margin-bottom: 4px; }
        .accordion-header {
            cursor: pointer;
            font-size: 0.85em;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin: 2px 0;
            border: 1px solid #e2e8f0;
            transition: 0.2s;
            font-weight: bold;
        }
        .accordion-header:hover { background: #e2e8f0; color: #333; }
        .accordion-content {
            margin-left: 10px;
            padding-left: 12px;
            border-left: 3px solid #cbd5e1;
            margin-top: 4px;
            margin-bottom: 8px;
            background: #fafbfc;
            border-radius: 0 6px 6px 0;
        }

        .variation-block {
            margin-left: 45px;
            padding: 4px 0;
            background-color: #fcfcfc;
            border-left: 3px solid #cbd5e1;
            font-size: 0.95em;
        }
        .variation-block::before {
            content: '↳';
            position: absolute;
            left: -18px;
            top: 10px;
            color: #bdc3c7;
            font-weight: bold;
        }

        .control-panel { display: flex; flex-direction: column; gap: 20px; width: 380px; }
        .panel-box { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button { padding: 15px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.05em; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        
        #newGameBtn { background-color: #27ae60; width: 100%; }
        
        .game-result { font-weight: bold; color: #27ae60; margin-top: 15px; text-align: center; font-size: 1.1em; }
        h4 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 1.2em; }

        .legal-move { position: relative; }
        .legal-move::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 30%; height: 30%; background-color: rgba(0, 0, 0, 0.25); 
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; 
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .analyzing-text { color: #f39c12; font-size: 0.85em; animation: pulse 1.5s infinite; }

        @media (max-width: 1350px) { body { flex-wrap: wrap; } }
        @media (max-width: 600px) {
            body { margin: 15px; gap: 15px; }
            #board-wrapper, .nav-container, #history-wrapper, .control-panel { width: 100%; max-width: 565px; margin: 0 auto; }
            #myBoard { width: calc(100% - 45px); } 
            .history-box { height: 350px; }
        }
    </style>
</head>
<body>

    <div id="board-wrapper">
        <div class="board-row">
            <div class="eval-bar" title="엔진 평가치">
                <div id="evalFill" class="eval-fill"></div>
                <div id="evalText" class="eval-text white-adv">0.0</div>
            </div>
            <div id="myBoard"></div>
        </div>
        <div class="nav-container">
            <button class="nav-btn" onclick="moveFirst()"><svg viewBox="0 0 24 24"><path d="M18 18L12 12L18 6M11 18L5 12L11 6"/></svg></button>
            <button class="nav-btn" onclick="movePrev()"><svg viewBox="0 0 24 24"><path d="M15 18L9 12L15 6"/></svg></button>
            <button class="nav-btn" onclick="moveNext()"><svg viewBox="0 0 24 24"><path d="M9 18L15 12L9 6"/></svg></button>
            <button class="nav-btn" onclick="moveLast()"><svg viewBox="0 0 24 24"><path d="M6 18L12 12L6 6M13 18L19 12L13 6"/></svg></button>
            <button class="nav-btn" onclick="board.flip()" title="보드 회전">
                <svg viewBox="0 0 24 24"><path d="M8 4V20M4 8L8 4L12 8M16 20V4M12 16L16 20L20 16"/></svg>
            </button>
        </div>
    </div>

    <div id="history-wrapper">
        <div class="history-box">
            <h4>📜 기보 히스토리</h4>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="control-panel">
        <button id="newGameBtn" style="display: none; margin-bottom: -10px;">새 분석 보드 생성</button>

        <!-- 💡 가로 배치 영역: 기보 불러오기 + 게임 정보 -->
        <div class="top-controls" style="display: flex; gap: 15px;">
            <div class="panel-box" id="importSection" style="display: none; flex: 1; padding: 15px;">
                <h4 style="color:#f39c12; font-size:1em;">📁 기보 불러오기</h4>
                <input type="text" id="importData" placeholder="FEN 또는 PGN" style="width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
                <button id="importBtn" style="background-color: #f39c12; width: 100%; padding: 10px; font-size: 0.9em;">적용 및 저장</button>
            </div>
            
            <div class="panel-box" id="gameInfoSection" style="flex: 1; padding: 15px;">
                <h4 style="font-size:1em;">게임 정보</h4>
                <div id="result" style="color: #666; font-size: 0.85em;">준비 완료.</div>
                <div id="gameResult" class="game-result" style="font-size: 0.95em; margin-top: 10px;"></div>
            </div>
        </div>

        <!-- 💡 새로 추가된 하단 영역: 엔진 추천 수 -->
        <div class="panel-box" id="recommendSection" style="padding: 15px;">
            <h4 style="font-size:1em; margin-bottom: 10px; color:#2c3e50;">💡 추천 수 (상위 3개)</h4>
            <div id="topMovesList" style="display:flex; flex-direction:column; gap:8px;">
                <!-- JavaScript를 통해 동적으로 렌더링됩니다 -->
                <div style="color:#888; font-size:0.9em; text-align:center;">기보를 클릭해 분석을 확인하세요.</div>
            </div>
        </div>
    </div>

    <script>
        var game = new Chess(); 
        var board = null;
        var currentGameId = null;

        var treeNodes = {};
        var rootNodeId = null;
        var currentNodeId = null;
        var tempIdCounter = 0;
        var initialGameFen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"; 

        var analysisQueue = [];
        var isAnalyzing = false;

        function removeLegalMoves() { $('#myBoard .square-55d63').removeClass('legal-move'); }
        
        var onDragStart = function(source, piece, position, orientation) {
            if (game.game_over()) return false;
            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return false;
            moves.forEach(function(move) { $('#myBoard .square-' + move.to).addClass('legal-move'); });
        };

        var onDrop = function(source, target) {
            removeLegalMoves();
            if (!currentGameId) return 'snapback';
            
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            tempIdCounter++;
            var newNodeId = "temp_" + tempIdCounter;
            
            var newNode = {
                id: newNodeId,
                dbId: null, 
                fen: game.fen(),
                moveSan: move.san,
                parentId: currentNodeId,
                children: [],
                engineScore: 'analyzing',
                analysisDetail: null
            };
            
            treeNodes[newNodeId] = newNode;
            
            if (currentNodeId) {
                var existingChildId = treeNodes[currentNodeId].children.find(childId => treeNodes[childId].moveSan === move.san);
                if (existingChildId) {
                    currentNodeId = existingChildId;
                    updateUI(true); 
                    return;
                } else {
                    treeNodes[currentNodeId].children.push(newNodeId);
                }
            } else {
                rootNodeId = newNodeId;
            }

            currentNodeId = newNodeId;
            renderTree(); 

            analysisQueue.push({
                nodeId: newNodeId,
                fen: newNode.fen,
                moveSan: newNode.moveSan,
                parentId: newNode.parentId
            });
            processAnalysisQueue(); 
        };

        
        function processAnalysisQueue() {
            if (isAnalyzing || analysisQueue.length === 0) return;
            isAnalyzing = true;

            var task = analysisQueue[0];
            var ajaxData = {
                gameId: currentGameId,
                fen: task.fen,
                moveSan: task.moveSan,
                depth: 18 
            };

            if (task.parentId) {
                var parentNode = treeNodes[task.parentId];
                if (!parentNode.dbId) {
                    isAnalyzing = false;
                    setTimeout(processAnalysisQueue, 200);
                    return;
                }
                ajaxData.parentPositionId = parentNode.dbId;
            }

            $.ajax({
                url: '/api/analysis',
                method: 'POST',
                data: ajaxData,
                success: function(res) {
                    var node = treeNodes[task.nodeId];
                    if(node) {
                        node.dbId = res.positionId; 
                        node.engineScore = res.engineScore;
                        // 💡 핵심: 서버에서 받아온 상세 데이터(추천 수)를 노드에 저장!
                        node.analysisDetail = res.analysisDetail; 
                        
                        var scoreHtml = '<span style="color:#d9534f; font-weight:bold;">' + res.engineScore + '</span>';
                        $('.history-item[data-id="' + task.nodeId + '"] .score-box').html(scoreHtml);
                        
                        if (currentNodeId === task.nodeId) {
                            updateEvalBar(res.engineScore);
                            renderTopMoves(res.analysisDetail);
                        }
                    }
                    analysisQueue.shift(); 
                    isAnalyzing = false;
                    processAnalysisQueue(); 
                },
                error: function() {
                    console.error("분석 실패, 재시도합니다.");
                    isAnalyzing = false;
                    setTimeout(processAnalysisQueue, 1000);
                }
            });
        }

        // 🟢 다중 추천 수를 화면에 그리는 함수 (뱃지 디자인 적용)
        function renderTopMoves(detailJsonStr) {
            var $list = $('#topMovesList');
            $list.empty();

            if (!detailJsonStr || detailJsonStr === 'analyzing') {
                $list.html('<div style="color:#f39c12; font-size:0.9em; text-align:center;" class="analyzing-text">엔진 분석 중입니다...</div>');
                return;
            }

            try {
                var detail = JSON.parse(detailJsonStr);
                if (detail.top_moves && detail.top_moves.length > 0) {
                    detail.top_moves.forEach(function(move) {
                        
                        // 💡 음수(-)인지 판별하여 검정 뱃지 / 흰색 뱃지 클래스 부여
                        var isBlackAdv = move.score.includes('-');
                        var badgeClass = isBlackAdv ? 'eval-badge black-adv' : 'eval-badge white-adv';
                        
                        var html = '<div style="display:flex; justify-content:space-between; align-items:center; background:#f8f9fa; padding:8px 12px; border-radius:6px; border:1px solid #dee2e6;">' +
                                   '<span style="font-weight:bold; font-size:1.05em; color:#2c3e50;">' + move.rank + '. ' + move.san + '</span>' +
                                   // 💡 span 태그에 뱃지 클래스 적용
                                   '<span class="' + badgeClass + '">' + move.score + '</span>' +
                                   '</div>';
                        $list.append(html);
                    });
                } else {
                    $list.html('<div style="color:#888; font-size:0.9em; text-align:center;">분석 데이터가 없습니다.</div>');
                }
            } catch (e) {
                $list.html('<div style="color:#888; font-size:0.9em; text-align:center;">데이터를 불러올 수 없습니다.</div>');
            }
        }

        var onSnapEnd = function() { board.position(game.fen()); };
        var onSnapbackEnd = function(piece, square, position, orientation) { removeLegalMoves(); };

        board = Chessboard('myBoard', {
            draggable: true, position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart, onDrop: onDrop,
            onSnapEnd: onSnapEnd, onSnapbackEnd: onSnapbackEnd
        });
        $(window).resize(board.resize);

        // 🟢 1. 평가치 퍼센트 변환 함수 (시그모이드 + 메이트 예외 처리)
        function calculateEvalPercentage(scoreStr) {
            if (!scoreStr) return 50;
            
            // 백 메이트 승리 확정 (+M3, M5 등) -> 게이지 100% (빈칸 없음)
            if (scoreStr.startsWith('+M') || (scoreStr.startsWith('M') && !scoreStr.startsWith('-M'))) {
                return 100;
            }
            // 흑 메이트 승리 확정 (-M2, -M4 등) -> 게이지 0% (완전 비움)
            if (scoreStr.startsWith('-M')) {
                return 0;
            }
            
            // 일반 평가치 (+0.28, -1.50 등)
            var score = parseFloat(scoreStr);
            if (isNaN(score)) return 50;
            
            // 시그모이드 함수 적용 (곡선 형태로 점진적 변화, 원래 쓰시던 0.3 가중치 적용)
            var sigmoid = 1 / (1 + Math.exp(-0.3 * score));
            var fillPercent = sigmoid * 100;
            
            // 🔴 메이트가 아닌 일반 점수는 최소 5%, 최대 95%까지만 차도록 강제 고정
            return Math.max(5, Math.min(95, fillPercent));
        }

        // 🟢 2. 평가치 바 및 텍스트 적용 로직 업데이트
        function updateEvalBar(scoreStr) {
            if (!scoreStr || scoreStr === 'analyzing') return;

            // 시그모이드 및 메이트 로직이 적용된 퍼센트 추출
            var fillPercent = calculateEvalPercentage(scoreStr);
            
            // 50% 이상이면 백 유리, 미만이면 흑 유리
            var isWhiteAdv = fillPercent >= 50;
            var displayStr = String(scoreStr).trim();

            // 일반 점수이면서 양수(백 유리)일 때 직관성을 위해 '+' 기호 추가
            if (!displayStr.includes('M')) {
                var score = parseFloat(displayStr);
                if (!isNaN(score) && score > 0 && !displayStr.startsWith('+')) {
                    displayStr = '+' + displayStr;
                }
            }

            // 막대 높이 애니메이션 적용
            $('#evalFill').css('height', fillPercent + '%');
            
            // 텍스트 내용 및 위치 업데이트
            var $evalText = $('#evalText');
            $evalText.text(displayStr);
            
            if (isWhiteAdv) {
                $evalText.removeClass('black-adv').addClass('white-adv');
            } else {
                $evalText.removeClass('white-adv').addClass('black-adv');
            }
        }

        // 🟢 트리를 처음 그리는 함수
        function renderTree() {
            $('#historyList').empty();
            if (!rootNodeId) return;
            var html = buildTableHtml(rootNodeId);
            $('#historyList').html(html);
            updateUI(true); 
        }

        // 🟢 표(Table) 형태로 기보를 렌더링하는 재귀 함수
        function buildTableHtml(startNodeId) {
            var html = '';
            var currId = startNodeId;
            var inRow = false;

            while (currId) {
                var node = treeNodes[currId];
                if (!node) break;

                var fenParts = node.fen.split(' ');
                var isBlack = (fenParts[1] === 'w'); // 방금 둔 수가 흑이면 다음 턴은 'w'
                var moveNum = parseInt(fenParts[5], 10);
                if (isBlack) moveNum -= 1;

                if (!isBlack) {
                    // 백의 수: 새로운 행(Row) 시작
                    html += '<div class="turn-row">';
                    html += '<div class="turn-num">' + moveNum + '.</div>';
                    html += '<div class="turn-moves">';
                    html += '<div class="move-clickable" data-id="' + node.id + '">' + node.moveSan + '</div>';
                    inRow = true;
                } else {
                    // 흑의 수: 기존 행에 덧붙이기
                    if (!inRow) {
                        // 서브 라인이 흑의 수부터 시작된 경우 행을 강제로 새로 염
                        html += '<div class="turn-row">';
                        html += '<div class="turn-num">' + moveNum + '...</div>';
                        html += '<div class="turn-moves">';
                        html += '<div style="flex:1;"></div>'; // 백의 수 자리를 비워둠
                        inRow = true;
                    }
                    html += '<div class="move-clickable" data-id="' + node.id + '">' + node.moveSan + '</div>';
                }

                // 현재 수에 다른 갈래(분기)가 있는지 체크
                var hasVariations = node.children.length > 1;
                
                // 줄을 닫아야 하는 조건: 흑의 수이거나, 다음 수가 없거나, 다른 갈래가 파생될 때
                if (isBlack || node.children.length === 0 || hasVariations) {
                    if (inRow && !isBlack) {
                         html += '<div style="flex:1;"></div>'; // 백의 수만 두고 끝났을 때 흑의 자리 보정
                    }
                    if (inRow) {
                        html += '</div></div>'; // turn-moves와 turn-row 닫기
                        inRow = false;
                    }
                }

                // 💡 분기가 있을 경우 들여쓰기 블록을 재귀적으로 렌더링
                if (hasVariations) {
                    for (var i = 1; i < node.children.length; i++) {
                        html += '<div class="variation-block">';
                        html += buildTableHtml(node.children[i]);
                        html += '</div>';
                    }
                }

                // 메인 라인으로 계속 진행
                if (node.children.length > 0) {
                    currId = node.children[0];
                } else {
                    currId = null;
                }
            }
            
            return html;
        }


        // 🟢 기존 이벤트 제거 및 클릭 이벤트 재등록
        $(document).off('click', '.history-item'); 
        $(document).off('click', '.move-clickable'); 
        $(document).on('click', '.move-clickable', function() {
            var targetIdRaw = $(this).attr('data-id');
            var actualId = isNaN(targetIdRaw) ? targetIdRaw : Number(targetIdRaw);
            goToNode(actualId);
        });

        // 🟢 UI 업데이트 함수 (최신화 완료 버전)
        function updateUI(shouldScroll) {
            // 옛날 .history-item이 아닌 .move-clickable을 조작합니다.
            $('.move-clickable').removeClass('active-node');
            
            if (currentNodeId) {
                var activeEl = $(`.move-clickable[data-id="${currentNodeId}"]`);
                activeEl.addClass('active-node');
                
                // 만약 숨겨진 아코디언 내부의 기보라면 자동으로 펼치기
                var parentAccordion = activeEl.parents('.accordion-content');
                if (parentAccordion.length > 0 && !parentAccordion.is(':visible')) {
                    parentAccordion.show();
                    parentAccordion.prev('.accordion-header').find('.toggle-icon').text('[-]');
                }

                if (shouldScroll && activeEl.length > 0) {
                    activeEl[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                
                // 현재 노드의 평가치 및 추천 수 화면에 렌더링
                var node = treeNodes[currentNodeId];
                if(node) {
                    updateEvalBar(node.engineScore);
                    renderTopMoves(node.analysisDetail); 
                }
            } else {
                updateEvalBar("0.0");
                renderTopMoves(null);
            }
        }

        

        function goToNode(nodeId) {
            currentNodeId = nodeId;
            var node = treeNodes[nodeId];
            game.load(node.fen);
            board.position(node.fen);
            updateUI(false); 
        }

        $(document).on('click', '.history-item', function() {
            var targetIdRaw = $(this).attr('data-id');
            var actualId = isNaN(targetIdRaw) ? targetIdRaw : Number(targetIdRaw);
            goToNode(actualId);
        });

        function moveFirst() { currentNodeId = null; game.load(initialGameFen); board.position(initialGameFen); updateUI(true); }
        function movePrev() {
            if (!currentNodeId) return;
            var node = treeNodes[currentNodeId];
            if (node.parentId && treeNodes[node.parentId]) { goToNode(node.parentId); } else { moveFirst(); }
            updateUI(true);
        }
        function moveNext() {
            if (!currentNodeId) { if (rootNodeId) goToNode(rootNodeId); return; }
            var node = treeNodes[currentNodeId];
            if (node.children.length > 0) { goToNode(node.children[0]); }
            updateUI(true);
        }
        function moveLast() {
            if (!rootNodeId) return;
            var curr = currentNodeId ? currentNodeId : rootNodeId;
            while(treeNodes[curr] && treeNodes[curr].children.length > 0) { curr = treeNodes[curr].children[0]; }
            goToNode(curr);
            updateUI(true);
        }

        $(document).keydown(function(e) {
            if ($("input:focus").length > 0) return;
            if (e.which === 37) movePrev();
            if (e.which === 39) moveNext();
            if (e.which === 38) moveFirst();
            if (e.which === 40) moveLast();
        });

        function loadGameTree() {
            if (!currentGameId) return;
            $.ajax({
                url: '/api/games/' + currentGameId + '/tree',
                method: 'GET',
                success: function(treeData) {
                    treeNodes = {}; 
                    rootNodeId = null; 
                    currentNodeId = null;
                    analysisQueue = []; 
                    isAnalyzing = false;

                    treeData.forEach(function(node) {
                        var score = node.engineScore;
                        var needsAnalysis = !score; 

                        treeNodes[node.positionId] = {
                            id: node.positionId,
                            dbId: node.positionId, 
                            fen: node.fen,
                            moveSan: node.moveSan,
                            parentId: node.parentPositionId,
                            engineScore: needsAnalysis ? 'analyzing' : score,
                            analysisDetail: node.analysisDetail, // 💡 DB에 저장된 추천수 맵핑!
                            children: []
                        };

                        if (needsAnalysis) {
                            analysisQueue.push({
                                nodeId: node.positionId,
                                fen: node.fen,
                                moveSan: node.moveSan,
                                parentId: node.parentPositionId
                            });
                        }
                    });

                    treeData.forEach(function(node) {
                        if (node.parentPositionId) {
                            if (treeNodes[node.parentPositionId]) { 
                                treeNodes[node.parentPositionId].children.push(node.positionId); 
                            }
                        } else {
                            if (!rootNodeId) rootNodeId = node.positionId;
                        }
                    });

                    renderTree();
                    moveFirst(); 

                    if (analysisQueue.length > 0) {
                        processAnalysisQueue();
                    }
                }
            });
        }

        $('#newGameBtn').on('click', function() {
            $.ajax({
                url: '/api/games',
                method: 'POST',
                success: function(res) {
                    currentGameId = res.gameId;
                    initialGameFen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
                    treeNodes = {}; rootNodeId = null; currentNodeId = null; tempIdCounter = 0;
                    analysisQueue = []; isAnalyzing = false;
                    
                    game.reset(); board.start(); 
                    $('#historyList').empty();
                    $('#gameResult').text("");
                    updateEvalBar("0.0"); 
                }
            });
        });

        function checkResult(pgn) {
            const results = ["1-0", "0-1", "1/2-1/2"];
            for(let r of results) { if(pgn.includes(" " + r) || pgn.endsWith(r)) { $('#gameResult').text("결과: " + r); return; } }
            $('#gameResult').text("");
        }

        $('#importBtn').on('click', function() {
            var inputData = $('#importData').val().trim();
            if (!inputData) return;
            checkResult(inputData);
            var isFen = inputData.includes('/') && (inputData.includes(' w ') || inputData.includes(' b '));
            var loadSuccess = isFen ? game.load(inputData) : game.load_pgn(inputData);
            if (!loadSuccess) { alert("유효하지 않은 형식입니다."); return; }
            
            initialGameFen = isFen ? inputData : "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
            
            var history = game.history({ verbose: true });
            var moveList = [];
            var tempGame = new Chess(initialGameFen);
            if (isFen) { moveList.push({ fen: inputData, moveSan: "START" }); } else {
                history.forEach(function(move) { tempGame.move(move.san); moveList.push({ fen: tempGame.fen(), moveSan: move.san }); });
            }
            
            analysisQueue = []; isAnalyzing = false;

            $.ajax({
                url: '/api/games/import',
                method: 'POST',
                withCredentials: true,
                contentType: 'application/json',
                data: JSON.stringify({ isFen: isFen, initialFen: initialGameFen, pgnContent: isFen ? null : inputData, moves: moveList }),
                success: function(res) {
                    currentGameId = res.gameId;
                    board.position(game.fen());
                    $('#result').html('<span style="color: #27ae60;">✅ DB 저장 완료!</span>');
                    loadGameTree(); 
                }
            });
        });

        $(document).ready(function() {
            var mode = localStorage.getItem("mode");
            if (mode === "import") { $('#newGameBtn').hide(); $('#importSection').show(); } 
            else { $('#importSection').hide(); $('#newGameBtn').show(); $('#newGameBtn').click(); }
            localStorage.removeItem("mode"); 
        });
    </script>
</body>
</html>
