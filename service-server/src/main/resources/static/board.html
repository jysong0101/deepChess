<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DeepChess API Tester</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <style>
        :root {
            --primary: #3498db;
            --secondary: #2c3e50;
            --bg: #f4f7f6;
            --border: #dee2e6;
        }

        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            margin: 40px; 
            display: flex; 
            gap: 25px; 
            background-color: var(--bg); 
            align-items: flex-start;
            justify-content: center;
        }

        #board-wrapper { display: flex; flex-direction: column; gap: 20px; }
        
        .board-row {
            display: flex;
            flex-direction: row;
            gap: 15px;
            align-items: stretch; 
        }

        #myBoard { width: 520px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        
        /* 🟢 평가치 바 (가로 너비 30px로 확대) */
        .eval-bar {
            width: 30px;
            background-color: #404040; 
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
            flex-shrink: 0;
        }
        .eval-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 50%; 
            background-color: #f8f9fa; 
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        /* 🟢 평가치 텍스트 디자인 */
        .eval-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-weight: 800;
            font-size: 11px;
            letter-spacing: -0.5px;
            z-index: 10;
            left: 0;
            transition: all 0.3s ease;
            user-select: none;
            pointer-events: none;
        }
        /* 백이 유리할 땐 아래쪽에 어두운 글씨 */
        .eval-text.white-adv {
            bottom: 8px;
            top: auto;
            color: #2c3e50; 
        }
        /* 흑이 유리할 땐 위쪽에 밝은 글씨 */
        .eval-text.black-adv {
            top: 8px;
            bottom: auto;
            color: #f8f9fa; 
        }

        .nav-container { display: flex; gap: 10px; width: 100%; max-width: 565px; } 
        .nav-btn { 
            flex: 1; padding: 15px; background-color: var(--secondary); color: white; 
            border: none; border-radius: 6px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-btn:hover { background-color: #1a252f; transform: translateY(-1px); }
        .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; }

        #history-wrapper { width: 360px; display: flex; flex-direction: column; }
        .history-box { 
            background-color: white; padding: 25px; border-radius: 12px; 
            border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            height: 580px; 
        }
        .history-list { 
            height: calc(100% - 40px); overflow-y: auto; display: flex; flex-direction: column; gap: 6px; 
            padding-right: 8px; margin-top: 15px;
        }
        .history-list::-webkit-scrollbar { width: 8px; }
        .history-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }

        .white-move { background-color: #ffffff; }
        .black-move { background-color: #f2f2f2; } 
        .white-move:hover { background-color: #f8f9fa; }
        .black-move:hover { background-color: #e5e5e5; }

        .history-item { 
            padding: 12px 16px; cursor: pointer; font-size: 1.15em; border-radius: 6px; 
            display: flex; justify-content: space-between; align-items: center; 
            border: 1px solid #eee; transition: 0.2s;
        }
        .active-node { background-color: #e1f0fa !important; border: 1px solid var(--primary) !important; font-weight: bold; }

        .variation-block {
            margin-left: 25px;
            padding-left: 10px;
            border-left: 3px solid #bdc3c7; 
            margin-top: 5px;
            margin-bottom: 5px;
            position: relative;
        }
        .variation-block::before {
            content: '↳';
            position: absolute;
            left: -18px;
            top: 10px;
            color: #bdc3c7;
            font-weight: bold;
        }

        .control-panel { display: flex; flex-direction: column; gap: 20px; width: 380px; }
        .panel-box { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        button { padding: 15px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.05em; transition: 0.2s; }
        button:hover { filter: brightness(1.1); }
        
        #newGameBtn { background-color: #27ae60; width: 100%; }
        
        .game-result { font-weight: bold; color: #27ae60; margin-top: 15px; text-align: center; font-size: 1.1em; }
        h4 { margin-top: 0; margin-bottom: 15px; color: #333; font-size: 1.2em; }

        .legal-move { position: relative; }
        .legal-move::after {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 30%; height: 30%; background-color: rgba(0, 0, 0, 0.25); 
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; 
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .analyzing-text { color: #f39c12; font-size: 0.85em; animation: pulse 1.5s infinite; }

        @media (max-width: 1350px) { body { flex-wrap: wrap; } }
        @media (max-width: 600px) {
            body { margin: 15px; gap: 15px; }
            #board-wrapper, .nav-container, #history-wrapper, .control-panel { width: 100%; max-width: 565px; margin: 0 auto; }
            #myBoard { width: calc(100% - 45px); } 
            .history-box { height: 350px; }
        }
    </style>
</head>
<body>

    <div id="board-wrapper">
        <div class="board-row">
            <div class="eval-bar" title="엔진 평가치">
                <div id="evalFill" class="eval-fill"></div>
                <div id="evalText" class="eval-text white-adv">0.0</div>
            </div>
            <div id="myBoard"></div>
        </div>
        <div class="nav-container">
            <button class="nav-btn" onclick="moveFirst()"><svg viewBox="0 0 24 24"><path d="M18 18L12 12L18 6M11 18L5 12L11 6"/></svg></button>
            <button class="nav-btn" onclick="movePrev()"><svg viewBox="0 0 24 24"><path d="M15 18L9 12L15 6"/></svg></button>
            <button class="nav-btn" onclick="moveNext()"><svg viewBox="0 0 24 24"><path d="M9 18L15 12L9 6"/></svg></button>
            <button class="nav-btn" onclick="moveLast()"><svg viewBox="0 0 24 24"><path d="M6 18L12 12L6 6M13 18L19 12L13 6"/></svg></button>
            <button class="nav-btn" onclick="board.flip()" title="보드 회전">
                <svg viewBox="0 0 24 24"><path d="M8 4V20M4 8L8 4L12 8M16 20V4M12 16L16 20L20 16"/></svg>
            </button>
        </div>
    </div>

    <div id="history-wrapper">
        <div class="history-box">
            <h4>📜 기보 히스토리</h4>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>

    <div class="control-panel">
        <button id="newGameBtn" style="display: none;">새 분석 보드 생성</button>

        <div class="panel-box" id="importSection" style="display: none;">
            <h4 style="color:#f39c12;">📁 기보 불러오기</h4>
            <input type="text" id="importData" placeholder="FEN 또는 PGN 입력" style="width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px;">
            <button id="importBtn" style="background-color: #f39c12; width: 100%;">적용 및 저장</button>
        </div>
        
        <div class="panel-box">
            <h4>게임 정보</h4>
            <div id="result" style="color: #666; font-size: 0.9em;">준비 완료.</div>
            <div id="gameResult" class="game-result"></div>
        </div>
    </div>

    <script>
        var game = new Chess(); 
        var board = null;
        var currentGameId = null;

        var treeNodes = {};
        var rootNodeId = null;
        var currentNodeId = null;
        var tempIdCounter = 0;
        var initialGameFen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1"; 

        var analysisQueue = [];
        var isAnalyzing = false;

        function removeLegalMoves() { $('#myBoard .square-55d63').removeClass('legal-move'); }
        
        var onDragStart = function(source, piece, position, orientation) {
            if (game.game_over()) return false;
            var moves = game.moves({ square: source, verbose: true });
            if (moves.length === 0) return false;
            moves.forEach(function(move) { $('#myBoard .square-' + move.to).addClass('legal-move'); });
        };

        var onDrop = function(source, target) {
            removeLegalMoves();
            if (!currentGameId) return 'snapback';
            
            var move = game.move({ from: source, to: target, promotion: 'q' });
            if (move === null) return 'snapback';

            tempIdCounter++;
            var newNodeId = "temp_" + tempIdCounter;
            
            var newNode = {
                id: newNodeId,
                dbId: null, 
                fen: game.fen(),
                moveSan: move.san,
                parentId: currentNodeId,
                children: [],
                engineScore: 'analyzing'
            };
            
            treeNodes[newNodeId] = newNode;
            
            if (currentNodeId) {
                var existingChildId = treeNodes[currentNodeId].children.find(childId => treeNodes[childId].moveSan === move.san);
                if (existingChildId) {
                    currentNodeId = existingChildId;
                    updateUI(true); 
                    return;
                } else {
                    treeNodes[currentNodeId].children.push(newNodeId);
                }
            } else {
                rootNodeId = newNodeId;
            }

            currentNodeId = newNodeId;
            renderTree(); 

            analysisQueue.push({
                nodeId: newNodeId,
                fen: newNode.fen,
                moveSan: newNode.moveSan,
                parentId: newNode.parentId
            });
            processAnalysisQueue(); 
        };

        function processAnalysisQueue() {
            if (isAnalyzing || analysisQueue.length === 0) return;
            isAnalyzing = true;

            var task = analysisQueue[0];
            var ajaxData = {
                gameId: currentGameId,
                fen: task.fen,
                moveSan: task.moveSan,
                depth: 18 
            };

            if (task.parentId) {
                var parentNode = treeNodes[task.parentId];
                if (!parentNode.dbId) {
                    isAnalyzing = false;
                    setTimeout(processAnalysisQueue, 200);
                    return;
                }
                ajaxData.parentPositionId = parentNode.dbId;
            }

            $.ajax({
                url: '/api/analysis',
                method: 'POST',
                data: ajaxData,
                success: function(res) {
                    var node = treeNodes[task.nodeId];
                    if(node) {
                        node.dbId = res.positionId; 
                        node.engineScore = res.engineScore;
                        
                        var scoreHtml = '<span style="color:#d9534f; font-weight:bold;">' + res.engineScore + '</span>';
                        $('.history-item[data-id="' + task.nodeId + '"] .score-box').html(scoreHtml);
                        
                        if (currentNodeId === task.nodeId) {
                            updateEvalBar(res.engineScore);
                        }
                    }
                    analysisQueue.shift(); 
                    isAnalyzing = false;
                    processAnalysisQueue(); 
                },
                error: function() {
                    console.error("분석 실패, 재시도합니다.");
                    isAnalyzing = false;
                    setTimeout(processAnalysisQueue, 1000);
                }
            });
        }

        var onSnapEnd = function() { board.position(game.fen()); };
        var onSnapbackEnd = function(piece, square, position, orientation) { removeLegalMoves(); };

        board = Chessboard('myBoard', {
            draggable: true, position: 'start',
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',
            onDragStart: onDragStart, onDrop: onDrop,
            onSnapEnd: onSnapEnd, onSnapbackEnd: onSnapbackEnd
        });
        $(window).resize(board.resize);

        // 🟢 평가치 바 및 텍스트 적용 로직 (시그모이드 + 메이트 연동)
        function updateEvalBar(scoreStr) {
            if (!scoreStr || scoreStr === 'analyzing') return;

            var fillPercent = 50; 
            var isWhiteAdv = true;
            var displayStr = scoreStr;

            if (scoreStr.includes('M') && !scoreStr.includes('-M')) {
                fillPercent = 100;
                isWhiteAdv = true;
            } else if (scoreStr.includes('-M')) {
                fillPercent = 0;
                isWhiteAdv = false;
            } else {
                var score = parseFloat(scoreStr);
                if (!isNaN(score)) {
                    var sigmoid = 1 / (1 + Math.exp(-0.3 * score));
                    fillPercent = sigmoid * 100;
                    fillPercent = Math.max(5, Math.min(95, fillPercent));
                    
                    isWhiteAdv = score >= 0;
                    // + 점수일 때 UI의 직관성을 위해 + 기호 추가
                    if (score > 0 && !displayStr.startsWith('+')) {
                        displayStr = '+' + displayStr;
                    }
                }
            }

            // 막대 높이 애니메이션 적용
            $('#evalFill').css('height', fillPercent + '%');
            
            // 텍스트 내용 및 위치 업데이트
            var $evalText = $('#evalText');
            $evalText.text(displayStr);
            if (isWhiteAdv) {
                $evalText.removeClass('black-adv').addClass('white-adv');
            } else {
                $evalText.removeClass('white-adv').addClass('black-adv');
            }
        }

        function renderTree() {
            $('#historyList').empty();
            if (!rootNodeId) return;
            var html = buildTreeHtml(rootNodeId);
            $('#historyList').html(html);
            updateUI(true); 
        }

        function buildTreeHtml(nodeId) {
            var node = treeNodes[nodeId];
            if (!node) return "";

            var fenParts = node.fen.split(' ');
            var moveNum = parseInt(fenParts[5], 10);
            var playedByWhite = (fenParts[1] === 'b');
            if (!playedByWhite) moveNum -= 1;
            
            var sanText = (playedByWhite ? moveNum + ". " : moveNum + "... ") + "<strong>" + node.moveSan + "</strong>";
            var moveClass = playedByWhite ? "white-move" : "black-move";
            
            var scoreHtml = node.engineScore === 'analyzing' 
                ? '<span class="analyzing-text">분석 중...</span>' 
                : '<span style="color:#d9534f; font-weight:bold;">' + (node.engineScore || '') + '</span>';

            var html = '<div class="history-item ' + moveClass + '" data-id="' + node.id + '" data-fen="' + node.fen + '">' +
                       '<div>' + sanText + '</div>' +
                       '<div class="score-box">' + scoreHtml + '</div>' +
                       '</div>';

            if (node.children.length > 0) {
                for (var i = 1; i < node.children.length; i++) {
                    html += '<div class="variation-block">';
                    html += buildTreeHtml(node.children[i]);
                    html += '</div>';
                }
                html += buildTreeHtml(node.children[0]);
            }
            return html;
        }

        function updateUI(shouldScroll) {
            $('.history-item').removeClass('active-node');
            if (currentNodeId) {
                var activeEl = $(`.history-item[data-id="${currentNodeId}"]`);
                activeEl.addClass('active-node');
                if (shouldScroll && activeEl.length > 0) {
                    activeEl[0].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
                var nodeScore = treeNodes[currentNodeId].engineScore;
                updateEvalBar(nodeScore);
            } else {
                updateEvalBar("0.0"); 
            }
        }

        function goToNode(nodeId) {
            currentNodeId = nodeId;
            var node = treeNodes[nodeId];
            game.load(node.fen);
            board.position(node.fen);
            updateUI(false); 
        }

        $(document).on('click', '.history-item', function() {
            var targetIdRaw = $(this).attr('data-id');
            var actualId = isNaN(targetIdRaw) ? targetIdRaw : Number(targetIdRaw);
            goToNode(actualId);
        });

        function moveFirst() { currentNodeId = null; game.load(initialGameFen); board.position(initialGameFen); updateUI(true); }
        function movePrev() {
            if (!currentNodeId) return;
            var node = treeNodes[currentNodeId];
            if (node.parentId && treeNodes[node.parentId]) { goToNode(node.parentId); } else { moveFirst(); }
            updateUI(true);
        }
        function moveNext() {
            if (!currentNodeId) { if (rootNodeId) goToNode(rootNodeId); return; }
            var node = treeNodes[currentNodeId];
            if (node.children.length > 0) { goToNode(node.children[0]); }
            updateUI(true);
        }
        function moveLast() {
            if (!rootNodeId) return;
            var curr = currentNodeId ? currentNodeId : rootNodeId;
            while(treeNodes[curr] && treeNodes[curr].children.length > 0) { curr = treeNodes[curr].children[0]; }
            goToNode(curr);
            updateUI(true);
        }

        $(document).keydown(function(e) {
            if ($("input:focus").length > 0) return;
            if (e.which === 37) movePrev();
            if (e.which === 39) moveNext();
            if (e.which === 38) moveFirst();
            if (e.which === 40) moveLast();
        });

        function loadGameTree() {
            if (!currentGameId) return;
            $.ajax({
                url: '/api/games/' + currentGameId + '/tree',
                method: 'GET',
                success: function(treeData) {
                    treeNodes = {}; 
                    rootNodeId = null; 
                    currentNodeId = null;
                    analysisQueue = []; 
                    isAnalyzing = false;

                    treeData.forEach(function(node) {
                        var score = node.engineScore;
                        var needsAnalysis = !score; 

                        treeNodes[node.positionId] = {
                            id: node.positionId,
                            dbId: node.positionId, 
                            fen: node.fen,
                            moveSan: node.moveSan,
                            parentId: node.parentPositionId,
                            engineScore: needsAnalysis ? 'analyzing' : score,
                            children: []
                        };

                        if (needsAnalysis) {
                            analysisQueue.push({
                                nodeId: node.positionId,
                                fen: node.fen,
                                moveSan: node.moveSan,
                                parentId: node.parentPositionId
                            });
                        }
                    });

                    treeData.forEach(function(node) {
                        if (node.parentPositionId) {
                            if (treeNodes[node.parentPositionId]) { 
                                treeNodes[node.parentPositionId].children.push(node.positionId); 
                            }
                        } else {
                            if (!rootNodeId) rootNodeId = node.positionId;
                        }
                    });

                    renderTree();
                    moveFirst(); 

                    if (analysisQueue.length > 0) {
                        processAnalysisQueue();
                    }
                }
            });
        }

        $('#newGameBtn').on('click', function() {
            $.ajax({
                url: '/api/games',
                method: 'POST',
                success: function(res) {
                    currentGameId = res.gameId;
                    initialGameFen = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
                    treeNodes = {}; rootNodeId = null; currentNodeId = null; tempIdCounter = 0;
                    analysisQueue = []; isAnalyzing = false;
                    
                    game.reset(); board.start(); 
                    $('#historyList').empty();
                    $('#gameResult').text("");
                    updateEvalBar("0.0"); 
                }
            });
        });

        function checkResult(pgn) {
            const results = ["1-0", "0-1", "1/2-1/2"];
            for(let r of results) { if(pgn.includes(" " + r) || pgn.endsWith(r)) { $('#gameResult').text("결과: " + r); return; } }
            $('#gameResult').text("");
        }

        $('#importBtn').on('click', function() {
            var inputData = $('#importData').val().trim();
            if (!inputData) return;
            checkResult(inputData);
            var isFen = inputData.includes('/') && (inputData.includes(' w ') || inputData.includes(' b '));
            var loadSuccess = isFen ? game.load(inputData) : game.load_pgn(inputData);
            if (!loadSuccess) { alert("유효하지 않은 형식입니다."); return; }
            
            initialGameFen = isFen ? inputData : "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
            
            var history = game.history({ verbose: true });
            var moveList = [];
            var tempGame = new Chess(initialGameFen);
            if (isFen) { moveList.push({ fen: inputData, moveSan: "START" }); } else {
                history.forEach(function(move) { tempGame.move(move.san); moveList.push({ fen: tempGame.fen(), moveSan: move.san }); });
            }
            
            analysisQueue = []; isAnalyzing = false;

            $.ajax({
                url: '/api/games/import',
                method: 'POST',
                withCredentials: true,
                contentType: 'application/json',
                data: JSON.stringify({ isFen: isFen, initialFen: initialGameFen, pgnContent: isFen ? null : inputData, moves: moveList }),
                success: function(res) {
                    currentGameId = res.gameId;
                    board.position(game.fen());
                    $('#result').html('<span style="color: #27ae60;">✅ DB 저장 완료!</span>');
                    loadGameTree(); 
                }
            });
        });

        $(document).ready(function() {
            var mode = localStorage.getItem("mode");
            if (mode === "import") { $('#newGameBtn').hide(); $('#importSection').show(); } 
            else { $('#importSection').hide(); $('#newGameBtn').show(); $('#newGameBtn').click(); }
            localStorage.removeItem("mode"); 
        });
    </script>
</body>
</html>
